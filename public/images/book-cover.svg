<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 440" role="img" aria-label="Agentic Design by Diego Packer Martins">
  <defs>
    <style>
      .aba-serif {
        font-family: 'Georgia', 'Times New Roman', serif;
      }
      .aba-sans-condensed {
        font-family: 'Arial Narrow', 'Helvetica Neue Condensed', 'Arial', sans-serif;
        font-stretch: condensed;
        font-weight: 700;
      }
      .aba-sans {
        font-family: 'Helvetica Neue', Arial, sans-serif;
      }
    </style>
  </defs>

  <!-- Border -->
  <rect x="1" y="1" width="318" height="438" fill="none" stroke="#111" stroke-width="2"/>

  <!-- Header band -->
  <rect x="2" y="2" width="316" height="88" fill="#ffffff"/>

  <!-- Body -->
  <rect x="2" y="90" width="316" height="348" fill="#5a7fb8"/>

  <!-- Leaf mark -->
  <g transform="translate(24 28)" fill="none" stroke="#6b7d3a" stroke-width="1.6" stroke-linecap="round">
    <path d="M0 18 C8 4, 22 0, 28 10 C20 8, 10 12, 0 18Z"/>
    <path d="M14 10 L14 24"/>
    <path d="M8 16 C12 14, 16 14, 20 16"/>
  </g>

  <!-- Imprint -->
  <text x="48" y="34" class="aba-serif" font-size="11" font-weight="700" letter-spacing="0.14em" fill="#111">
    AGENTIC DESIGN
  </text>
  <text x="48" y="52" class="aba-serif" font-size="9.5" font-style="italic" fill="#3d5f8a">
    From blanding to brand
  </text>

  <!-- Volume badge -->
  <circle cx="272" cy="90" r="34" fill="#111"/>
  <text x="272" y="78" text-anchor="middle" class="aba-serif" font-size="9" fill="#fff">№</text>
  <text x="272" y="104" text-anchor="middle" class="aba-serif" font-size="28" font-weight="700" fill="#fff">01</text>

  <!-- Author -->
  <text x="160" y="168" text-anchor="middle" class="aba-serif" font-size="19" font-weight="700" fill="#fff">
    Diego Packer Martins
  </text>

  <!-- Top rule -->
  <line x1="72" y1="182" x2="248" y2="182" stroke="#111" stroke-width="1.5"/>

  <!-- Title -->
  <text x="160" y="228" text-anchor="middle" class="aba-sans-condensed" font-size="34" letter-spacing="0.04em" fill="#fff">
    AGENTIC
  </text>
  <text x="160" y="272" text-anchor="middle" class="aba-sans-condensed" font-size="34" letter-spacing="0.04em" fill="#fff">
    DESIGN
  </text>

  <!-- Bottom rule -->
  <line x1="72" y1="286" x2="248" y2="286" stroke="#111" stroke-width="1.5"/>

  <!-- Kicker -->
  <text x="160" y="312" text-anchor="middle" class="aba-sans" font-size="7.5" font-weight="700" letter-spacing="0.16em" fill="#fff">
    AI-NATIVE · AI-POWERED · AI-READY
  </text>
  <text x="160" y="334" text-anchor="middle" class="aba-serif" font-size="10.5" fill="#fff">
    Building Design Systems
  </text>
  <text x="160" y="350" text-anchor="middle" class="aba-serif" font-size="10.5" fill="#fff">
    for the Age of Agents
  </text>
</svg>
